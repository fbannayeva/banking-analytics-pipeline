name: dbt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install dbt-duckdb duckdb faker pandas numpy

      - name: Generate data
        run: python scripts/generate_data.py

      - name: Load data into DuckDB
        run: python scripts/load_to_duckdb.py

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt run
        working-directory: dbt
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        run: dbt test --profiles-dir .
