name: dbt CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install dbt-duckdb faker pandas numpy

      - name: Generate data
        run: python scripts/generate_data.py

      - name: Load raw data into DuckDB
        run: python scripts/load_to_duckdb.py

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt
        run: dbt compile --profiles-dir .

      - name: dbt run
        working-directory: dbt
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        run: dbt test --profiles-dir .

      - name: dbt docs generate
        working-directory: dbt
        run: dbt docs generate --profiles-dir .

      - name: Upload dbt docs
        uses: actions/upload-artifact@v3
        with:
          name: dbt-docs
          path: dbt/target/
