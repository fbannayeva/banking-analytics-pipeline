version: '3.8'

services:

  # ── Data pipeline: generate → load → dbt run/test ──────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./dbt:/app/dbt
    command: >
      sh -c "python scripts/generate_data.py &&
             python scripts/load_to_duckdb.py &&
             cd dbt && dbt run --profiles-dir . && dbt test --profiles-dir ."

  # ── Streamlit dashboard ─────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - pipeline
    command: streamlit run streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  data:
